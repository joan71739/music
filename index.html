<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>金曲擴充播放器</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --green: #1DB954;
  --green-dim: rgba(29,185,84,0.15);
  --bg: #0a0a0a;
  --surface: #141414;
  --border: #222;
  --text: #fff;
  --muted: #666;
  --subtle: #aaa;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  user-select: none;
}

/* ── LOGIN ── */
#login-view {
  text-align: center;
  padding: 2rem;
}
.login-icon { font-size: 64px; margin-bottom: 1.2rem; }
.login-title { font-size: 24px; font-weight: 700; margin-bottom: 0.4rem; }
.login-sub { font-size: 14px; color: var(--muted); margin-bottom: 2rem; }

/* ── PLAYER ── */
#player-view {
  width: 100%;
  max-width: 420px;
  padding: 1.5rem 1.5rem 2rem;
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 0;
}

/* Status area */
.status-area {
  text-align: center;
  margin-bottom: 1.8rem;
  min-height: 160px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
#status-icon { font-size: 72px; margin-bottom: 0.8rem; }
#status-text { font-size: 15px; color: var(--muted); }

/* Playing indicator */
#playing-indicator {
  display: none;
  align-items: flex-end;
  justify-content: center;
  gap: 4px;
  height: 28px;
  margin-bottom: 0.8rem;
}
#playing-indicator.show { display: flex; }
.bar {
  width: 4px;
  background: var(--green);
  border-radius: 2px;
  animation: bounce 1.2s ease-in-out infinite;
}
.bar:nth-child(1) { height: 10px; animation-delay: 0s; }
.bar:nth-child(2) { height: 22px; animation-delay: 0.2s; }
.bar:nth-child(3) { height: 16px; animation-delay: 0.4s; }
.bar:nth-child(4) { height: 26px; animation-delay: 0.1s; }
.bar:nth-child(5) { height: 12px; animation-delay: 0.3s; }
@keyframes bounce { 0%,100% { transform: scaleY(0.4); } 50% { transform: scaleY(1); } }

/* Song info */
.song-info {
  text-align: center;
  min-height: 68px;
  margin-bottom: 1.2rem;
}
#song-name {
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
  opacity: 0;
  transition: opacity 0.5s;
  margin-bottom: 0.3rem;
  line-height: 1.3;
}
#artist-name {
  font-size: 14px;
  color: var(--subtle);
  opacity: 0;
  transition: opacity 0.5s;
}
#song-name.show, #artist-name.show { opacity: 1; }

/* Timer bar */
#timer-wrap {
  display: none;
  width: 100%;
  margin-bottom: 1.2rem;
}
#timer-wrap.show { display: block; }
#timer-bar-bg {
  width: 100%;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}
#timer-bar {
  height: 100%;
  background: var(--green);
  width: 100%;
  transform-origin: left;
  transition: none;
}
#timer-label {
  font-size: 12px;
  color: var(--muted);
  text-align: right;
  margin-top: 6px;
}

/* Pause/Resume button */
#playpause-btn {
  background: none;
  border: 1.5px solid var(--green);
  color: var(--green);
  width: 52px;
  height: 52px;
  border-radius: 50%;
  font-size: 20px;
  cursor: pointer;
  transition: background 0.2s, transform 0.12s;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0.75;
}
#playpause-btn:hover { background: var(--green-dim); opacity: 1; }
#playpause-btn:active { transform: scale(0.92); }

/* Reveal button */
#reveal-btn {
  display: none;
  background: none;
  border: 1px solid var(--border);
  color: var(--subtle);
  padding: 0.55rem 1.4rem;
  border-radius: 50px;
  font-size: 14px;
  cursor: pointer;
  margin-bottom: 1.2rem;
  transition: color 0.3s, border-color 0.3s;
}
#reveal-btn:hover { border-color: var(--green); color: var(--green); }

/* ── SETTINGS PANEL ── */
.settings-toggle {
  display: flex;
  align-items: center;
  gap: 8px;
  background: none;
  border: 1px solid var(--border);
  color: var(--muted);
  padding: 0.5rem 1.2rem;
  border-radius: 50px;
  font-size: 13px;
  cursor: pointer;
  margin-bottom: 0.8rem;
  width: 100%;
  justify-content: center;
  transition: border-color 0.2s, color 0.2s;
}
.settings-toggle:hover { border-color: #444; color: var(--subtle); }
.settings-toggle .arrow {
  display: inline-block;
  transition: transform 0.25s;
  font-style: normal;
}
.settings-toggle.open .arrow { transform: rotate(180deg); }

#settings-panel {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1rem 1.2rem;
  display: none;
  flex-direction: column;
  gap: 1rem;
  margin-bottom: 1rem;
}
#settings-panel.open { display: flex; }

.setting-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
}
.setting-label {
  font-size: 13px;
  color: var(--subtle);
  white-space: nowrap;
}
.setting-label small {
  display: block;
  font-size: 11px;
  color: var(--muted);
  margin-top: 2px;
}

/* Toggle switch */
.toggle-switch {
  position: relative;
  width: 44px;
  height: 24px;
  flex-shrink: 0;
}
.toggle-switch input { opacity: 0; width: 0; height: 0; }
.toggle-track {
  position: absolute;
  inset: 0;
  background: var(--border);
  border-radius: 24px;
  cursor: pointer;
  transition: background 0.2s;
}
.toggle-track::before {
  content: '';
  position: absolute;
  width: 18px; height: 18px;
  left: 3px; top: 3px;
  background: #fff;
  border-radius: 50%;
  transition: transform 0.2s;
}
.toggle-switch input:checked + .toggle-track { background: var(--green); }
.toggle-switch input:checked + .toggle-track::before { transform: translateX(20px); }

/* Number input */
.num-input {
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 8px;
  padding: 0.35rem 0.6rem;
  font-size: 14px;
  width: 90px;
  text-align: right;
}
.num-input:focus { outline: none; border-color: var(--green); }
.num-input:disabled { opacity: 0.35; }

.setting-unit { font-size: 12px; color: var(--muted); margin-left: 4px; }

/* ── BOTTOM ACTIONS ── */
.bottom-actions {
  display: flex;
  gap: 0.5rem;
  width: 100%;
  justify-content: center;
  margin-top: 0.5rem;
}
.btn-sm {
  background: none;
  border: 1px solid var(--border);
  color: var(--muted);
  padding: 0.5rem 1rem;
  border-radius: 50px;
  font-size: 13px;
  cursor: pointer;
  transition: border-color 0.2s, color 0.2s;
}
.btn-sm:hover { border-color: #444; color: var(--subtle); }

/* Green CTA */
.btn-green {
  background: var(--green);
  color: #000;
  border: none;
  font-weight: 700;
  font-size: 15px;
  padding: 0.85rem 2.2rem;
  border-radius: 50px;
  cursor: pointer;
  transition: transform 0.1s, opacity 0.2s;
}
.btn-green:hover { opacity: 0.9; }
.btn-green:active { transform: scale(0.97); }

/* Debug */
#debug-box {
  margin-top: 0.8rem;
  font-size: 11px;
  color: var(--muted);
  word-break: break-all;
  background: var(--surface);
  padding: 0.8rem;
  border-radius: 8px;
  white-space: pre-wrap;
  width: 100%;
  display: none;
  border: 1px solid var(--border);
}

/* Pulse */
.pulse { animation: pulse 2s infinite; }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.35; } }

/* Mode badge */
#mode-badge {
  display: none;
  font-size: 11px;
  color: var(--green);
  background: var(--green-dim);
  border-radius: 50px;
  padding: 3px 10px;
  margin-bottom: 1rem;
}
#mode-badge.show { display: inline-block; }
</style>
</head>
<body>

<!-- ── LOGIN ── -->
<div id="login-view">
  <div class="login-icon">🎵</div>
  <div class="login-title">金曲擴充播放器</div>
  <div class="login-sub">掃描 NFC 卡自動播放 Spotify 歌曲<br>需要 Spotify Premium 帳號</div>
  <button class="btn-green" onclick="login()">連結 Spotify 帳號</button>
</div>

<!-- ── PLAYER ── -->
<div id="player-view">

  <!-- Status -->
  <div class="status-area">
    <div id="status-icon" class="pulse">📡</div>
    <div id="status-text">靠近 NFC 卡開始播放</div>
  </div>

  <!-- Playing indicator -->
  <div id="playing-indicator">
    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    <div class="bar"></div><div class="bar"></div>
  </div>

  <!-- Mode badge -->
  <div id="mode-badge"></div>

  <!-- Song info -->
  <div class="song-info">
    <div id="song-name"></div>
    <div id="artist-name"></div>
  </div>

  <!-- Reveal -->
  <button id="reveal-btn" onclick="revealSong()">揭曉答案 👀</button>

  <!-- Timer bar -->
  <div id="timer-wrap">
    <div id="timer-bar-bg"><div id="timer-bar"></div></div>
    <div id="timer-label"></div>
  </div>

  <!-- Settings toggle -->
  <button class="settings-toggle" id="settings-toggle-btn" onclick="toggleSettings()">
    ⚙️ 播放設定 <i class="arrow">▾</i>
  </button>

  <!-- Settings panel -->
  <div id="settings-panel">

    <!-- Duration mode -->
    <div class="setting-row">
      <div class="setting-label">限時播放<small>關閉則完整播放</small></div>
      <label class="toggle-switch">
        <input type="checkbox" id="setting-limit" onchange="saveSettings()">
        <div class="toggle-track"></div>
      </label>
    </div>

    <!-- Duration seconds -->
    <div class="setting-row">
      <div class="setting-label">播放時長<small>限時模式使用</small></div>
      <div style="display:flex;align-items:center">
        <input type="number" class="num-input" id="setting-duration" value="30" min="1" max="300" onchange="saveSettings()">
        <span class="setting-unit">秒</span>
      </div>
    </div>

    <!-- Start offset -->
    <div class="setting-row">
      <div class="setting-label">開始位置<small>從第幾秒播起</small></div>
      <div style="display:flex;align-items:center">
        <input type="number" class="num-input" id="setting-start" value="0" min="0" max="600" onchange="saveSettings()">
        <span class="setting-unit">秒</span>
      </div>
    </div>

  </div>

  <!-- Playback toolbar (divider + pause/resume) -->
  <div id="playback-toolbar" style="display:none; flex-direction:column; align-items:center; width:100%; gap:0.8rem; margin-bottom:0.5rem">
    <div style="width:100%; height:1px; background:var(--border);"></div>
    <button id="playpause-btn" onclick="togglePlayPause()" aria-label="暫停／繼續">
      <i id="playpause-icon" class="ti ti-player-pause"></i>
    </button>
  </div>

  <!-- Bottom actions -->
  <div class="bottom-actions">
    <button class="btn-sm" onclick="doLogout()">🚪 登出</button>
    <button class="btn-sm" onclick="doDebug()">🔍 測試連線</button>
  </div>

  <div id="debug-box"></div>

</div>

<script>
/* ──────────────────────────────────────────
   CONFIG
────────────────────────────────────────── */
const CLIENT_ID   = 'de45db7ad49b41efb68dbaa362f65f8c';
const REDIRECT_URI = window.location.origin + window.location.pathname;
const SCOPES       = 'user-read-playback-state user-modify-playback-state user-read-currently-playing';

let token = null;
let currentTrackName  = '';
let currentArtistName = '';
let timerHandle = null;
let isTimerDone = false;   // 時間到後鎖定
let isPaused    = false;   // 目前是否手動暫停中

/* ──────────────────────────────────────────
   SETTINGS  (persisted in localStorage)
────────────────────────────────────────── */
function loadSettings() {
  const raw = localStorage.getItem('player_settings');
  const defaults = { limitMode: false, durationSec: 30, startSec: 0 };
  if (!raw) return defaults;
  try { return { ...defaults, ...JSON.parse(raw) }; } catch(e) { return defaults; }
}

function saveSettings() {
  const s = {
    limitMode:   document.getElementById('setting-limit').checked,
    durationSec: parseInt(document.getElementById('setting-duration').value) || 30,
    startSec:    parseInt(document.getElementById('setting-start').value) || 0,
  };
  localStorage.setItem('player_settings', JSON.stringify(s));
  updateDurationInputState(s.limitMode);
}

function applySettingsToUI(s) {
  document.getElementById('setting-limit').checked     = s.limitMode;
  document.getElementById('setting-duration').value    = s.durationSec;
  document.getElementById('setting-start').value       = s.startSec;
  updateDurationInputState(s.limitMode);
}

function updateDurationInputState(limitMode) {
  document.getElementById('setting-duration').disabled = !limitMode;
}

/* ──────────────────────────────────────────
   SETTINGS PANEL TOGGLE
────────────────────────────────────────── */
function toggleSettings() {
  const panel = document.getElementById('settings-panel');
  const btn   = document.getElementById('settings-toggle-btn');
  const open  = panel.classList.toggle('open');
  btn.classList.toggle('open', open);
}

/* ──────────────────────────────────────────
   VIEWS
────────────────────────────────────────── */
function showView(name) {
  document.getElementById('login-view').style.display  = name === 'login'  ? 'block' : 'none';
  document.getElementById('player-view').style.display = name === 'player' ? 'flex'  : 'none';
}

function setStatus(icon, text, pulse = false) {
  const el = document.getElementById('status-icon');
  el.textContent = icon;
  el.className = pulse ? 'pulse' : '';
  document.getElementById('status-text').textContent = text;
}

/* ──────────────────────────────────────────
   AUTH
────────────────────────────────────────── */
function login() {
  const state    = rand(16);
  const verifier = rand(64);
  sessionStorage.setItem('cv', verifier);
  sessionStorage.setItem('st', state);
  challenge(verifier).then(ch => {
    const p = new URLSearchParams({
      response_type: 'code', client_id: CLIENT_ID,
      scope: SCOPES, redirect_uri: REDIRECT_URI,
      state, code_challenge_method: 'S256', code_challenge: ch
    });
    window.location = 'https://accounts.spotify.com/authorize?' + p;
  });
}

function doLogout() {
  localStorage.removeItem('spotify_token');
  localStorage.removeItem('spotify_refresh');
  localStorage.removeItem('spotify_expires');
  token = null;
  showView('login');
}

function rand(n) {
  const c = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
  let r = '';
  for (let i = 0; i < n; i++) r += c[Math.floor(Math.random() * c.length)];
  return r;
}

async function challenge(v) {
  const d = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(v));
  return btoa(String.fromCharCode(...new Uint8Array(d)))
    .replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}

async function handleCallback() {
  const p     = new URLSearchParams(window.location.search);
  const code  = p.get('code');
  const state = p.get('state');
  if (!code || state !== sessionStorage.getItem('st')) return false;

  window.history.replaceState({}, '', window.location.pathname);

  const r = await fetch('https://accounts.spotify.com/api/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({
      grant_type: 'authorization_code', code,
      redirect_uri: REDIRECT_URI, client_id: CLIENT_ID,
      code_verifier: sessionStorage.getItem('cv')
    })
  });
  const d = await r.json();
  if (d.access_token) {
    token = d.access_token;
    localStorage.setItem('spotify_token',   token);
    localStorage.setItem('spotify_refresh', d.refresh_token);
    localStorage.setItem('spotify_expires', Date.now() + d.expires_in * 1000);
    return true;
  }
  return false;
}

async function refreshToken() {
  const refresh = localStorage.getItem('spotify_refresh');
  if (!refresh) return false;
  const r = await fetch('https://accounts.spotify.com/api/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({ grant_type: 'refresh_token', refresh_token: refresh, client_id: CLIENT_ID })
  });
  const d = await r.json();
  if (d.access_token) {
    token = d.access_token;
    localStorage.setItem('spotify_token',   token);
    localStorage.setItem('spotify_expires', Date.now() + d.expires_in * 1000);
    return true;
  }
  return false;
}

async function getToken() {
  if (token) return token;
  const t   = localStorage.getItem('spotify_token');
  const exp = localStorage.getItem('spotify_expires');
  if (t && exp && Date.now() < parseInt(exp) - 60000) { token = t; return token; }
  const ok = await refreshToken();
  return ok ? token : null;
}

/* ──────────────────────────────────────────
   NFC / URL PARAMETER PARSING
────────────────────────────────────────── */
function parsePlayParams() {
  const p         = new URLSearchParams(window.location.search);
  const uri       = p.get('uri');
  if (!uri) return null;

  const s        = loadSettings();

  // Per-card overrides
  const startMs    = p.has('start_ms')    ? parseInt(p.get('start_ms'))    : null;
  const durationMs = p.has('duration_ms') ? parseInt(p.get('duration_ms')) : null;

  // Resolve final values
  const resolvedStartMs    = startMs    !== null ? startMs    : (s.startSec * 1000);
  const resolvedDurationMs = durationMs !== null ? durationMs : (s.limitMode ? s.durationSec * 1000 : null);

  return { uri, startMs: resolvedStartMs, durationMs: resolvedDurationMs };
}

/* ──────────────────────────────────────────
   PAUSE / RESUME  (含計時器凍結)
────────────────────────────────────────── */
// 計時器狀態
let timerRemainingMs = 0;   // 暫停時記錄剩餘毫秒
let timerStartedAt   = 0;   // 本段開始跑的時間戳
let tickHandle       = null;

function showPlayPause(show) {
  const toolbar = document.getElementById('playback-toolbar');
  toolbar.style.display = show ? 'flex' : 'none';
}

function syncPlayPauseIcon() {
  const icon = document.getElementById('playpause-icon');
  icon.className = isPaused ? 'ti ti-player-play' : 'ti ti-player-pause';
}

async function togglePlayPause() {
  if (isTimerDone) return;
  const t = await getToken();
  if (!t) return;

  if (isPaused) {
    // ── 繼續 ──
    await fetch('https://api.spotify.com/v1/me/player/play', {
      method: 'PUT', headers: { Authorization: 'Bearer ' + t }
    });
    isPaused = false;
    setStatus('🎵', '播放中');
    document.getElementById('playing-indicator').classList.add('show');
    syncPlayPauseIcon();
    // 從剩餘時間重新跑計時器
    resumeTimer();
  } else {
    // ── 暫停 ──
    await fetch('https://api.spotify.com/v1/me/player/pause', {
      method: 'PUT', headers: { Authorization: 'Bearer ' + t }
    });
    isPaused = true;
    setStatus('⏸️', '已暫停');
    document.getElementById('playing-indicator').classList.remove('show');
    syncPlayPauseIcon();
    // 凍結計時器
    pauseTimer();
  }
}

/* 凍結計時器：算出剩餘毫秒，停掉所有計時 */
function pauseTimer() {
  if (!timerStartedAt) return;
  const elapsed = Date.now() - timerStartedAt;
  timerRemainingMs = Math.max(0, timerRemainingMs - elapsed);
  timerStartedAt = 0;

  clearTimeout(timerHandle);
  clearInterval(tickHandle);

  // 凍結進度條：讀出目前寬度並鎖住
  const bar = document.getElementById('timer-bar');
  const computed = getComputedStyle(bar).width;
  bar.style.transition = 'none';
  bar.style.width = computed;

  // 更新 label
  document.getElementById('timer-label').textContent =
    Math.ceil(timerRemainingMs / 1000) + ' 秒（暫停）';
}

/* 從剩餘時間恢復計時器 */
function resumeTimer() {
  if (timerRemainingMs <= 0) return;
  runTimer(timerRemainingMs);
}

/* 實際跑計時（供 startTimer 和 resumeTimer 共用） */
function runTimer(durationMs) {
  clearTimeout(timerHandle);
  clearInterval(tickHandle);

  timerRemainingMs = durationMs;
  timerStartedAt   = Date.now();

  const bar   = document.getElementById('timer-bar');
  const label = document.getElementById('timer-label');

  // 進度條從目前位置縮到 0
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      bar.style.transition = `width ${durationMs}ms linear`;
      bar.style.width = '0%';
    });
  });

  // 倒數 label（每秒更新）
  let remaining = Math.ceil(durationMs / 1000);
  label.textContent = remaining + ' 秒';
  tickHandle = setInterval(() => {
    remaining--;
    if (remaining <= 0) { clearInterval(tickHandle); label.textContent = '時間到！'; }
    else label.textContent = remaining + ' 秒';
  }, 1000);

  // 時間到自動暫停
  timerHandle = setTimeout(async () => {
    clearInterval(tickHandle);
    isTimerDone    = true;
    timerStartedAt = 0;
    showPlayPause(false);
    const t = await getToken();
    if (t) {
      await fetch('https://api.spotify.com/v1/me/player/pause', {
        method: 'PUT', headers: { Authorization: 'Bearer ' + t }
      });
    }
    setStatus('⏸️', '試聽結束，等待揭曉');
    document.getElementById('playing-indicator').classList.remove('show');
  }, durationMs);
}

function startTimer(durationMs) {
  const wrap = document.getElementById('timer-wrap');
  wrap.classList.add('show');
  const bar = document.getElementById('timer-bar');
  bar.style.transition = 'none';
  bar.style.width = '100%';
  runTimer(durationMs);
}

function resetTimer() {
  clearTimeout(timerHandle);
  clearInterval(tickHandle);
  isTimerDone      = false;
  isPaused         = false;
  timerRemainingMs = 0;
  timerStartedAt   = 0;
  showPlayPause(false);
  const wrap = document.getElementById('timer-wrap');
  wrap.classList.remove('show');
  const bar = document.getElementById('timer-bar');
  bar.style.transition = 'none';
  bar.style.width = '100%';
}

/* ──────────────────────────────────────────
   PLAYBACK
────────────────────────────────────────── */
async function playTrack(uri, startMs, durationMs) {
  resetTimer();
  setStatus('⏳', '連線中...');
  document.getElementById('playing-indicator').classList.remove('show');
  document.getElementById('mode-badge').classList.remove('show');

  const t = await getToken();
  if (!t) { setStatus('⚠️', '請重新登入'); showView('login'); return; }

  setStatus('⏳', '尋找裝置...');
  const dr = await fetch('https://api.spotify.com/v1/me/player/devices', {
    headers: { Authorization: 'Bearer ' + t }
  });
  if (dr.status === 401) { setStatus('⚠️', '登入過期，請重新登入'); doLogout(); return; }

  const dd      = await dr.json();
  const devices = dd.devices || [];
  if (devices.length === 0) {
    setStatus('⚠️', '找不到裝置！請先開啟 Spotify app');
    return;
  }

  const dev = devices.find(d => d.is_active) || devices[0];
  setStatus('⏳', '切換歌曲...');

  const body = { uris: [uri] };
  if (startMs && startMs > 0) body.position_ms = startMs;

  const pr = await fetch('https://api.spotify.com/v1/me/player/play?device_id=' + dev.id, {
    method: 'PUT',
    headers: { Authorization: 'Bearer ' + t, 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });

  if (pr.status === 403) { setStatus('⚠️', '需要 Spotify Premium'); return; }

  if (pr.status === 204 || pr.status === 200) {
    setStatus('🎵', '播放中');
    isPaused = false;
    document.getElementById('playing-indicator').classList.add('show');
    document.getElementById('reveal-btn').style.display = 'inline-block';
    showPlayPause(true);
    syncPlayPauseIcon();

    // Mode badge
    if (durationMs) {
      const badge = document.getElementById('mode-badge');
      badge.textContent = `限時 ${Math.round(durationMs/1000)} 秒`;
      badge.classList.add('show');
      setTimeout(() => startTimer(durationMs), 500);
    }

    setTimeout(getTrackInfo, 1000);
  } else {
    setStatus('⚠️', '播放失敗（狀態碼 ' + pr.status + '）');
  }
}

async function getTrackInfo() {
  const t = await getToken();
  if (!t) return;
  const r = await fetch('https://api.spotify.com/v1/me/player/currently-playing', {
    headers: { Authorization: 'Bearer ' + t }
  });
  if (r.status === 200) {
    const d = await r.json();
    if (d && d.item) {
      currentTrackName  = d.item.name;
      currentArtistName = d.item.artists.map(a => a.name).join(', ');
      document.getElementById('song-name').textContent  = currentTrackName;
      document.getElementById('artist-name').textContent = currentArtistName;
    }
  }
}

function revealSong() {
  document.getElementById('song-name').classList.add('show');
  document.getElementById('artist-name').classList.add('show');
  const btn = document.getElementById('reveal-btn');
  btn.textContent     = '✅ ' + (currentTrackName || '（歌曲名稱）');
  btn.style.color     = 'var(--green)';
  btn.style.borderColor = 'var(--green)';
}

/* ──────────────────────────────────────────
   CHECK NFC TRIGGER
────────────────────────────────────────── */
function checkNFC() {
  const params = parsePlayParams();
  if (!params || !token) return;

  window.history.replaceState({}, '', window.location.pathname);

  // Reset UI
  document.getElementById('song-name').classList.remove('show');
  document.getElementById('artist-name').classList.remove('show');
  const revealBtn = document.getElementById('reveal-btn');
  revealBtn.style.display = 'none';
  revealBtn.textContent = '揭曉答案 👀';
  revealBtn.style.color = '';
  revealBtn.style.borderColor = '';
  currentTrackName = '';
  currentArtistName = '';

  setTimeout(() => playTrack(params.uri, params.startMs, params.durationMs), 300);
}

/* ──────────────────────────────────────────
   DEBUG
────────────────────────────────────────── */
async function doDebug() {
  const box = document.getElementById('debug-box');
  box.style.display = 'block';
  box.textContent   = '測試中...\n';

  const t   = localStorage.getItem('spotify_token');
  const exp = localStorage.getItem('spotify_expires');
  box.textContent += 'Token: '    + (t   ? t.substring(0,15) + '...' : '無') + '\n';
  box.textContent += 'Token 有效: ' + (exp ? (Date.now() < parseInt(exp) ? '是' : '已過期') : '無') + '\n';
  box.textContent += 'accessToken 變數: ' + (token ? '有' : '無') + '\n\n';

  const s = loadSettings();
  box.textContent += '限時模式: ' + s.limitMode + '\n';
  box.textContent += '播放秒數: ' + s.durationSec + '\n';
  box.textContent += '開始位置: ' + s.startSec + '秒\n\n';

  if (!t) { box.textContent += '沒有 Token，請重新登入'; return; }

  try {
    const r = await fetch('https://api.spotify.com/v1/me/player/devices', {
      headers: { Authorization: 'Bearer ' + t }
    });
    box.textContent += 'API 狀態: ' + r.status + '\n';
    const d = await r.json();
    box.textContent += '裝置數量: ' + (d.devices ? d.devices.length : 0) + '\n';
    (d.devices || []).forEach(dev => {
      box.textContent += `- ${dev.name} (${dev.type}) 活躍:${dev.is_active}\n`;
    });
    if (!d.devices || d.devices.length === 0) {
      box.textContent += JSON.stringify(d) + '\n';
    }
  } catch(e) {
    box.textContent += '錯誤: ' + e.message;
  }
}

/* ──────────────────────────────────────────
   INIT
────────────────────────────────────────── */
async function init() {
  // Apply saved settings
  applySettingsToUI(loadSettings());

  // Handle OAuth callback
  const ok = await handleCallback();
  if (ok) {
    showView('player');
    checkNFC();
    return;
  }

  // Restore existing token
  const t = await getToken();
  if (t) {
    showView('player');
    checkNFC();
    return;
  }

  showView('login');
}

init();
</script>
