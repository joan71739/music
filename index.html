<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>金曲歌王</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/home.css">
</head>
<body>
  <div id="home-view">
    <div class="home-logo">
      <div class="home-logo-icon">
        <i class="ti ti-vinyl" aria-hidden="true"></i>
      </div>
      <div class="home-title">金曲歌王</div>
      <div class="home-sub">選擇模式開始遊戲</div>
    </div>

    <div class="mode-list">
      <a href="mode-select.html" class="mode-card mode-active">
        <div class="mode-icon">
          <i class="ti ti-user" aria-hidden="true"></i>
        </div>
        <div class="mode-info">
          <div class="mode-name">單獨遊玩</div>
          <div class="mode-desc">一個人或共用一台裝置</div>
        </div>
        <i class="ti ti-chevron-right mode-arr" aria-hidden="true"></i>
      </a>

      <a href="host-create.html" class="mode-card mode-active">
        <div class="mode-icon">
          <i class="ti ti-users" aria-hidden="true"></i>
        </div>
        <div class="mode-info">
          <div class="mode-name">多人遊玩</div>
          <div class="mode-desc">各自手機搶答，即時競賽</div>
        </div>
        <i class="ti ti-chevron-right mode-arr" aria-hidden="true"></i>
      </a>

    <div class="home-footer">
      <span>金曲歌王 2+</span>
      <span class="home-footer-dot">·</span>
      <span>Powered by Spotify</span>
    </div>
  </div>
</body>
</html>
