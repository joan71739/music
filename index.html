<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>金曲擴充播放器</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #0a0a0a;
  color: #fff;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  user-select: none;
}
#main { text-align: center; padding: 2rem; width: 100%; max-width: 400px; }
#status-icon { font-size: 80px; margin-bottom: 1.5rem; }
#status-text { font-size: 18px; color: #888; margin-bottom: 0.5rem; }
#song-name { font-size: 26px; font-weight: 600; color: #fff; min-height: 40px; margin-bottom: 0.3rem; opacity: 0; transition: opacity 0.5s; }
#artist-name { font-size: 16px; color: #aaa; min-height: 24px; margin-bottom: 2rem; opacity: 0; transition: opacity 0.5s; }
#song-name.show, #artist-name.show { opacity: 1; }
.btn { background: none; border: 1px solid #333; color: #666; padding: 0.6rem 1.5rem; border-radius: 50px; font-size: 14px; cursor: pointer; margin: 0.3rem; }
.btn-green { background: #1DB954; color: #000; border: none; font-weight: 600; font-size: 16px; padding: 0.8rem 2rem; }
#playing-indicator { display: none; align-items: center; justify-content: center; gap: 4px; margin-bottom: 1.5rem; }
#playing-indicator.show { display: flex; }
.bar { width: 4px; background: #1DB954; border-radius: 2px; animation: bounce 1.2s ease-in-out infinite; }
.bar:nth-child(1) { height: 12px; animation-delay: 0s; }
.bar:nth-child(2) { height: 20px; animation-delay: 0.2s; }
.bar:nth-child(3) { height: 16px; animation-delay: 0.4s; }
.bar:nth-child(4) { height: 24px; animation-delay: 0.1s; }
.bar:nth-child(5) { height: 14px; animation-delay: 0.3s; }
@keyframes bounce { 0%, 100% { transform: scaleY(0.5); } 50% { transform: scaleY(1); } }
.pulse { animation: pulse 2s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
#debug-box { margin-top: 1rem; font-size: 11px; color: #666; word-break: break-all; text-align: left; background: #111; padding: 1rem; border-radius: 8px; white-space: pre-wrap; }
</style>
</head>
<body>
<div id="main">

  <div id="login-view">
    <div style="font-size:60px; margin-bottom:1rem">🎵</div>
    <div style="font-size:22px; font-weight:600; margin-bottom:0.5rem">金曲擴充播放器</div>
    <div style="font-size:14px; color:#666; margin-bottom:1.5rem">請先登入 Spotify（需要 Premium）</div>
    <button class="btn btn-green" onclick="login()">連結 Spotify</button>
  </div>

  <div id="player-view" style="display:none">
    <div id="status-icon" class="pulse">📡</div>
    <div id="status-text">靠近 NFC 卡開始播放</div>
    <div id="playing-indicator">
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
      <div class="bar"></div><div class="bar"></div>
    </div>
    <div id="song-name"></div>
    <div id="artist-name"></div>
    <button id="reveal-btn" class="btn" onclick="revealSong()" style="display:none">揭曉答案 👀</button>
    <div style="margin-top:3rem">
      <button class="btn" onclick="doLogout()">🚪 登出</button>
      <button class="btn" onclick="doDebug()">🔍 測試連線</button>
    </div>
    <div id="debug-box" style="display:none"></div>
  </div>

</div>

<script>
const CLIENT_ID = 'de45db7ad49b41efb68dbaa362f65f8c';
const REDIRECT_URI = window.location.origin + window.location.pathname;
const SCOPES = 'user-read-playback-state user-modify-playback-state user-read-currently-playing';

let token = null;
let currentTrackName = '';
let currentArtistName = '';

function showView(name) {
  document.getElementById('login-view').style.display = name === 'login' ? 'block' : 'none';
  document.getElementById('player-view').style.display = name === 'player' ? 'block' : 'none';
}

function setStatus(icon, text) {
  document.getElementById('status-icon').textContent = icon;
  document.getElementById('status-icon').className = '';
  document.getElementById('status-text').textContent = text;
}

function doLogout() {
  localStorage.clear();
  sessionStorage.clear();
  token = null;
  showView('login');
}

async function doDebug() {
  const box = document.getElementById('debug-box');
  box.style.display = 'block';
  box.textContent = '測試中...\n';

  const t = localStorage.getItem('spotify_token');
  const exp = localStorage.getItem('spotify_expires');
  box.textContent += 'Token: ' + (t ? t.substring(0,15) + '...' : '無') + '\n';
  box.textContent += 'Token有效: ' + (exp ? (Date.now() < parseInt(exp) ? '是' : '已過期') : '無') + '\n';
  box.textContent += 'accessToken變數: ' + (token ? '有' : '無') + '\n\n';

  if (!t) { box.textContent += '沒有Token，請重新登入'; return; }

  try {
    const r = await fetch('https://api.spotify.com/v1/me/player/devices', {
      headers: { Authorization: 'Bearer ' + t }
    });
    box.textContent += 'API狀態: ' + r.status + '\n';
    const d = await r.json();
    box.textContent += '裝置數量: ' + (d.devices ? d.devices.length : 0) + '\n';
    if (d.devices && d.devices.length > 0) {
      d.devices.forEach(dev => {
        box.textContent += '- ' + dev.name + ' (' + dev.type + ') 活躍:' + dev.is_active + '\n';
      });
    } else {
      box.textContent += '沒有找到裝置\n';
      box.textContent += JSON.stringify(d) + '\n';
    }
  } catch(e) {
    box.textContent += '錯誤: ' + e.message;
  }
}

function login() {
  const state = rand(16);
  const verifier = rand(64);
  sessionStorage.setItem('cv', verifier);
  sessionStorage.setItem('st', state);
  challenge(verifier).then(ch => {
    const p = new URLSearchParams({
      response_type: 'code', client_id: CLIENT_ID,
      scope: SCOPES, redirect_uri: REDIRECT_URI,
      state, code_challenge_method: 'S256', code_challenge: ch
    });
    window.location = 'https://accounts.spotify.com/authorize?' + p;
  });
}

function rand(n) {
  const c = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
  let r = '';
  for (let i = 0; i < n; i++) r += c[Math.floor(Math.random() * c.length)];
  return r;
}

async function challenge(v) {
  const d = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(v));
  return btoa(String.fromCharCode(...new Uint8Array(d))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}

async function handleCallback() {
  const p = new URLSearchParams(window.location.search);
  const code = p.get('code');
  const state = p.get('state');
  if (!code || state !== sessionStorage.getItem('st')) return false;

  window.history.replaceState({}, '', window.location.pathname);

  const r = await fetch('https://accounts.spotify.com/api/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({
      grant_type: 'authorization_code', code,
      redirect_uri: REDIRECT_URI, client_id: CLIENT_ID,
      code_verifier: sessionStorage.getItem('cv')
    })
  });
  const d = await r.json();
  if (d.access_token) {
    token = d.access_token;
    localStorage.setItem('spotify_token', token);
    localStorage.setItem('spotify_refresh', d.refresh_token);
    localStorage.setItem('spotify_expires', Date.now() + d.expires_in * 1000);
    return true;
  }
  return false;
}

async function refreshToken() {
  const refresh = localStorage.getItem('spotify_refresh');
  if (!refresh) return false;
  const r = await fetch('https://accounts.spotify.com/api/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({ grant_type: 'refresh_token', refresh_token: refresh, client_id: CLIENT_ID })
  });
  const d = await r.json();
  if (d.access_token) {
    token = d.access_token;
    localStorage.setItem('spotify_token', token);
    localStorage.setItem('spotify_expires', Date.now() + d.expires_in * 1000);
    return true;
  }
  return false;
}

async function getToken() {
  if (token) return token;
  const t = localStorage.getItem('spotify_token');
  const exp = localStorage.getItem('spotify_expires');
  if (t && exp && Date.now() < parseInt(exp) - 60000) {
    token = t;
    return token;
  }
  const ok = await refreshToken();
  return ok ? token : null;
}

async function playTrack(uri) {
  setStatus('⏳', '連線中...');
  const t = await getToken();
  if (!t) { setStatus('⚠️', '請重新登入'); showView('login'); return; }

  setStatus('⏳', '尋找裝置...');
  const dr = await fetch('https://api.spotify.com/v1/me/player/devices', {
    headers: { Authorization: 'Bearer ' + t }
  });

  if (dr.status === 401) { setStatus('⚠️', '登入過期，請重新登入'); doLogout(); return; }

  const dd = await dr.json();
  const devices = dd.devices || [];

  if (devices.length === 0) {
    setStatus('⚠️', '找不到裝置！請先開 Spotify app 播放一首歌');
    return;
  }

  const dev = devices.find(d => d.is_active) || devices[0];
  setStatus('⏳', '切換歌曲...');

  const pr = await fetch('https://api.spotify.com/v1/me/player/play?device_id=' + dev.id, {
    method: 'PUT',
    headers: { Authorization: 'Bearer ' + t, 'Content-Type': 'application/json' },
    body: JSON.stringify({ uris: [uri] })
  });

  if (pr.status === 403) { setStatus('⚠️', '需要 Spotify Premium'); return; }
  if (pr.status === 204 || pr.status === 200) {
    setStatus('🎵', '播放中...');
    document.getElementById('playing-indicator').classList.add('show');
    document.getElementById('reveal-btn').style.display = 'inline-block';
    setTimeout(getTrackInfo, 1000);
  } else {
    setStatus('⚠️', '播放失敗 狀態碼:' + pr.status);
  }
}

async function getTrackInfo() {
  const t = await getToken();
  if (!t) return;
  const r = await fetch('https://api.spotify.com/v1/me/player/currently-playing', {
    headers: { Authorization: 'Bearer ' + t }
  });
  if (r.status === 200) {
    const d = await r.json();
    if (d && d.item) {
      currentTrackName = d.item.name;
      currentArtistName = d.item.artists.map(a => a.name).join(', ');
      document.getElementById('song-name').textContent = currentTrackName;
      document.getElementById('artist-name').textContent = currentArtistName;
    }
  }
}

function revealSong() {
  document.getElementById('song-name').classList.add('show');
  document.getElementById('artist-name').classList.add('show');
  document.getElementById('reveal-btn').textContent = '✅ ' + currentTrackName;
  document.getElementById('reveal-btn').style.color = '#1DB954';
  document.getElementById('reveal-btn').style.borderColor = '#1DB954';
}

function checkNFC() {
  const p = new URLSearchParams(window.location.search);
  const uri = p.get('uri');
  if (uri && token) {
    window.history.replaceState({}, '', window.location.pathname);
    document.getElementById('song-name').classList.remove('show');
    document.getElementById('artist-name').classList.remove('show');
    document.getElementById('reveal-btn').style.display = 'none';
    document.getElementById('playing-indicator').classList.remove('show');
    document.getElementById('debug-box').style.display = 'none';
    setTimeout(() => playTrack(uri), 300);
  }
}

async function init() {
  const ok = await handleCallback();
  if (ok) { showView('player'); checkNFC(); return; }

  const t = await getToken();
  if (t) { showView('player'); checkNFC(); return; }

  showView('login');
}

init();
</script>
</body>
</html>
